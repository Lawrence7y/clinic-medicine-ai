<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增 AI 模型')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-model-add">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">服务商：</label>
            <div class="col-sm-8">
                <select name="providerId" class="form-control m-b" required>
                    <option value="">请选择服务商</option>
                    <option th:each="item : ${providers}" th:value="${item.providerId}" th:text="${item.providerName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">模型编码：</label>
            <div class="col-sm-8">
                <input name="modelCode" class="form-control" type="text" required placeholder="请填写模型编码（由服务商提供）">
                <span class="help-block m-b-none">用于实际调用的模型标识，需与服务商接口保持一致。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">模型名称：</label>
            <div class="col-sm-8">
                <input name="modelName" class="form-control" type="text" required placeholder="请填写模型展示名称（可附业务用途）">
                <span class="help-block m-b-none">用于页面展示，可包含业务用途说明。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">支持视觉：</label>
            <div class="col-sm-8">
                <select name="supportsVision" class="form-control m-b"><option value="1">是</option><option value="0">否</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">支持联网搜索：</label>
            <div class="col-sm-8">
                <select name="supportsWebSearch" class="form-control m-b"><option value="1">是</option><option value="0">否</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">支持 JSON 输出：</label>
            <div class="col-sm-8">
                <select name="supportsJsonSchema" class="form-control m-b"><option value="1">是</option><option value="0">否</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="enabled" class="form-control m-b"><option value="1">启用</option><option value="0">停用</option></select>
                <span class="help-block m-b-none">场景绑定仅会优先选择“服务商启用 + 模型启用”的模型。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8"><textarea name="remark" class="form-control" rows="4"></textarea></div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script>
    var prefix = ctx + "clinic/ai/model";
    $("#form-model-add").validate({ focusCleanup: true });

    function handleSaveResponse(result) {
        if (result && result.code === 0) {
            $.modal.msgSuccess("保存成功，配置已生效");
            if (window.parent && window.parent.$ && window.parent.$.table) {
                window.parent.$.table.refresh();
            }
            $.modal.close();
            return;
        }
        $.modal.msgError((result && result.msg) || "保存失败，请检查后重试");
    }

    function submitHandler() {
        if (!$.validate.form()) return;
        $.modal.loading("正在保存配置，请稍候...");
        $.ajax({
            url: prefix + "/add",
            type: "post",
            data: $('#form-model-add').serialize(),
            success: function(result) {
                $.modal.closeLoading();
                handleSaveResponse(result);
            },
            error: function(xhr) {
                $.modal.closeLoading();
                var response = xhr && xhr.responseJSON ? xhr.responseJSON : null;
                $.modal.msgError((response && response.msg) || "保存失败，请稍后重试");
            }
        });
    }
</script>
</body>
</html>
