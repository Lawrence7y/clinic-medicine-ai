<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改 AI 模型')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-model-edit" th:object="${model}">
        <input name="modelId" type="hidden" th:field="*{modelId}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">服务商：</label>
            <div class="col-sm-8">
                <select name="providerId" class="form-control m-b" th:field="*{providerId}" required>
                    <option value="">请选择服务商</option>
                    <option th:each="item : ${providers}" th:value="${item.providerId}" th:text="${item.providerName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">模型编码：</label>
            <div class="col-sm-8">
                <input name="modelCode" class="form-control" type="text" th:field="*{modelCode}" required>
                <span class="help-block m-b-none">模型编码应与服务商实际模型 ID 保持一致。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">模型名称：</label>
            <div class="col-sm-8">
                <input name="modelName" class="form-control" type="text" th:field="*{modelName}" required>
                <span class="help-block m-b-none">模型名称用于管理界面展示，不影响实际调用。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">支持视觉：</label>
            <div class="col-sm-8"><select name="supportsVision" class="form-control m-b" th:field="*{supportsVision}"><option value="1">是</option><option value="0">否</option></select></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">支持联网搜索：</label>
            <div class="col-sm-8"><select name="supportsWebSearch" class="form-control m-b" th:field="*{supportsWebSearch}"><option value="1">是</option><option value="0">否</option></select></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">支持 JSON 输出：</label>
            <div class="col-sm-8"><select name="supportsJsonSchema" class="form-control m-b" th:field="*{supportsJsonSchema}"><option value="1">是</option><option value="0">否</option></select></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="enabled" class="form-control m-b" th:field="*{enabled}"><option value="1">启用</option><option value="0">停用</option></select>
                <span class="help-block m-b-none">停用后该模型不会参与任何场景调度。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8"><textarea name="remark" class="form-control" rows="4" th:field="*{remark}"></textarea></div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script>
    var prefix = ctx + "clinic/ai/model";
    $("#form-model-edit").validate({ focusCleanup: true });

    function handleSaveResponse(result) {
        if (result && result.code === 0) {
            $.modal.msgSuccess("保存成功，配置已生效");
            if (window.parent && window.parent.$ && window.parent.$.table) {
                window.parent.$.table.refresh();
            }
            $.modal.close();
            return;
        }
        $.modal.msgError((result && result.msg) || "保存失败，请检查后重试");
    }

    function submitHandler() {
        if (!$.validate.form()) return;
        $.modal.loading("正在保存配置，请稍候...");
        $.ajax({
            url: prefix + "/edit",
            type: "post",
            data: $('#form-model-edit').serialize(),
            success: function(result) {
                $.modal.closeLoading();
                handleSaveResponse(result);
            },
            error: function(xhr) {
                $.modal.closeLoading();
                var response = xhr && xhr.responseJSON ? xhr.responseJSON : null;
                $.modal.msgError((response && response.msg) || "保存失败，请稍后重试");
            }
        });
    }
</script>
</body>
</html>
