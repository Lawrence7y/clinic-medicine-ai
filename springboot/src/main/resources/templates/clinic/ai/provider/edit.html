<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改 AI 服务商')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-provider-edit" th:object="${provider}">
        <input name="providerId" type="hidden" th:field="*{providerId}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">服务商编码：</label>
            <div class="col-sm-8">
                <input name="providerCode" class="form-control" type="text" th:field="*{providerCode}" required>
                <span class="help-block m-b-none">服务商编码用于内部唯一标识，修改后会影响已绑定模型。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">服务商名称：</label>
            <div class="col-sm-8">
                <input name="providerName" class="form-control" type="text" th:field="*{providerName}" required>
                <span class="help-block m-b-none">服务商名称会在模型和场景页面展示。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">API 地址：</label>
            <div class="col-sm-8">
                <input name="apiBaseUrl" class="form-control" type="text" th:field="*{apiBaseUrl}">
                <span class="help-block m-b-none">建议填写可公网访问的 HTTPS 接口地址。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">接口密钥：</label>
            <div class="col-sm-8">
                <input name="apiKey" class="form-control" type="text" placeholder="留空表示保留原有密钥">
                <span class="help-block m-b-none">出于安全考虑，列表页只显示掩码，编辑页留空不会清空旧值。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="enabled" class="form-control m-b" th:field="*{enabled}">
                    <option value="1">启用</option>
                    <option value="0">停用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8"><textarea name="remark" class="form-control" rows="4" th:field="*{remark}"></textarea></div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script>
    var prefix = ctx + "clinic/ai/provider";
    $("#form-provider-edit").validate({ focusCleanup: true });

    function handleSaveResponse(result) {
        if (result && result.code === 0) {
            $.modal.msgSuccess("保存成功，配置已生效");
            if (window.parent && window.parent.$ && window.parent.$.table) {
                window.parent.$.table.refresh();
            }
            $.modal.close();
            return;
        }
        $.modal.msgError((result && result.msg) || "保存失败，请检查后重试");
    }

    function submitHandler() {
        if (!$.validate.form()) return;
        $.modal.loading("正在保存配置，请稍候...");
        $.ajax({
            url: prefix + "/edit",
            type: "post",
            data: $('#form-provider-edit').serialize(),
            success: function(result) {
                $.modal.closeLoading();
                handleSaveResponse(result);
            },
            error: function(xhr) {
                $.modal.closeLoading();
                var response = xhr && xhr.responseJSON ? xhr.responseJSON : null;
                $.modal.msgError((response && response.msg) || "保存失败，请稍后重试");
            }
        });
    }
</script>
</body>
</html>
