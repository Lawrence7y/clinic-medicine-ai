<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('AI 服务商列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12">
            <div class="alert alert-info" style="margin-bottom: 15px;">
                统一术语说明：接口地址 = 调用服务的 Base URL，接口密钥 = 访问凭证。保存后可在“模型配置”中继续绑定模型。
            </div>
        </div>
        <div class="col-sm-12 search-collapse">
            <form id="provider-form">
                <div class="select-list">
                    <ul>
                        <li>服务商编码：<input type="text" name="providerCode"/></li>
                        <li>服务商名称：<input type="text" name="providerName"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="clinic:ai:provider:add">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="clinic:ai:provider:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="clinic:ai:provider:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('clinic:ai:provider:edit')}]];
    var removeFlag = [[${@permission.hasPermi('clinic:ai:provider:remove')}]];
    var testFlag = [[${@permission.hasPermi('clinic:ai:provider:test')}]];
    var prefix = ctx + "clinic/ai/provider";

    $(function () {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "AI 服务商",
            columns: [{
                checkbox: true
            }, {
                field: 'providerId',
                title: 'ID'
            }, {
                field: 'providerCode',
                title: '服务商编码'
            }, {
                field: 'providerName',
                title: '服务商名称'
            }, {
                field: 'apiBaseUrl',
                title: '接口地址'
            }, {
                field: 'apiKey',
                title: '接口密钥'
            }, {
                field: 'enabled',
                title: '状态',
                formatter: function (value) {
                    return Number(value) === 1
                        ? '<span class="label label-primary">启用</span>'
                        : '<span class="label label-default">停用</span>';
                }
            }, {
                field: 'remark',
                title: '备注'
            }, {
                title: '操作',
                align: 'center',
                formatter: function (value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.providerId + '\')"><i class="fa fa-edit"></i>修改</a> ');
                    actions.push('<a class="btn btn-info btn-xs ' + testFlag + '" href="javascript:void(0)" onclick="testProvider(' + row.providerId + ')"><i class="fa fa-bolt"></i>测试</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.providerId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function testProvider(providerId) {
        $.modal.loading("正在测试服务商连接...");
        $.ajax({
            url: prefix + "/test",
            type: "post",
            data: { providerId: providerId },
            success: function(result) {
                $.modal.closeLoading();
                if (result.code === 0) {
                    $.modal.alertSuccess(result.data || result.msg);
                } else {
                    $.modal.alertError(result.msg || "服务商连接测试失败");
                }
            },
            error: function() {
                $.modal.closeLoading();
                $.modal.alertError("服务商连接测试失败");
            }
        });
    }
</script>
</body>
</html>
