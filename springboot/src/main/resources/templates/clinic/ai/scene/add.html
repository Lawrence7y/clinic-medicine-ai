<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增 AI 场景绑定')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-scene-add">
        <div class="alert alert-info" style="margin: 0 15px 20px;">
            主模型和兜底模型为全局配置，新增或修改后会同步更新所有识别场景。
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">场景编码：</label>
            <div class="col-sm-8">
                <input name="sceneCode" class="form-control" type="text" required placeholder="请填写场景编码（用于接口与日志标识）">
                <span class="help-block m-b-none">场景编码用于接口路由和日志标识，建议保持稳定。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">场景名称：</label>
            <div class="col-sm-8">
                <input name="sceneName" class="form-control" type="text" required placeholder="如：AI 助手对话">
                <span class="help-block m-b-none">场景名称用于后台展示，建议与业务页面名称一致。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">执行模式：</label>
            <div class="col-sm-8">
                <select name="executionMode" class="form-control m-b">
                    <option value="model_only">仅模型</option>
                    <option value="local_only">仅本地</option>
                    <option value="local_then_model">本地优先，模型兜底</option>
                </select>
                <span class="help-block m-b-none">“本地优先，模型兜底”可在本地识别失败时自动回退到模型调用。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">主模型：</label>
            <div class="col-sm-8">
                <select name="primaryModelId" class="form-control m-b">
                    <option value="">不设置</option>
                    <option th:each="item : ${models}" th:value="${item.modelId}" th:text="${item.providerName + ' / ' + item.modelName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">兜底模型：</label>
            <div class="col-sm-8">
                <select name="fallbackModelId" class="form-control m-b">
                    <option value="">不设置</option>
                    <option th:each="item : ${models}" th:value="${item.modelId}" th:text="${item.providerName + ' / ' + item.modelName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">候选上限：</label>
            <div class="col-sm-8">
                <input name="candidateLimit" class="form-control" type="number" value="3">
                <span class="help-block m-b-none">控制候选结果数量，建议范围 1-10。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">超时（毫秒）：</label>
            <div class="col-sm-8">
                <input name="timeoutMs" class="form-control" type="number" value="15000">
                <span class="help-block m-b-none">模型调用超时阈值，建议不低于 5000 毫秒。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8"><select name="enabled" class="form-control m-b"><option value="1">启用</option><option value="0">停用</option></select></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8"><textarea name="remark" class="form-control" rows="4"></textarea></div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script>
    var prefix = ctx + "clinic/ai/scene";
    $("#form-scene-add").validate({ focusCleanup: true });

    function handleSaveResponse(result) {
        if (result && result.code === 0) {
            $.modal.msgSuccess("保存成功，配置已生效");
            if (window.parent && window.parent.$ && window.parent.$.table) {
                window.parent.$.table.refresh();
            }
            $.modal.close();
            return;
        }
        $.modal.msgError((result && result.msg) || "保存失败，请检查后重试");
    }

    function submitHandler() {
        if (!$.validate.form()) return;
        $.modal.loading("正在保存配置，请稍候...");
        $.ajax({
            url: prefix + "/add",
            type: "post",
            data: $('#form-scene-add').serialize(),
            success: function(result) {
                $.modal.closeLoading();
                handleSaveResponse(result);
            },
            error: function(xhr) {
                $.modal.closeLoading();
                var response = xhr && xhr.responseJSON ? xhr.responseJSON : null;
                $.modal.msgError((response && response.msg) || "保存失败，请稍后重试");
            }
        });
    }
</script>
</body>
</html>
