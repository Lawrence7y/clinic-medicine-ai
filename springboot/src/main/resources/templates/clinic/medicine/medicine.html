<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('药品列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="medicine-form">
                <div class="select-list">
                    <ul>
                        <li>药品名称：<input type="text" name="name"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="clinic:medicine:add">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="clinic:medicine:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-info" onclick="openStockInPage()" shiro:hasPermission="clinic:medicine:edit">
                <i class="fa fa-sign-in"></i> 入库
            </a>
            <a class="btn btn-warning" onclick="openStockOutPage()" shiro:hasPermission="clinic:medicine:edit">
                <i class="fa fa-sign-out"></i> 出库
            </a>
            <a class="btn btn-danger" onclick="openExpiryWarningPage()" shiro:hasPermission="clinic:medicine:edit">
                <i class="fa fa-clock-o"></i> 有效期管理
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="clinic:medicine:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('clinic:medicine:edit')}]];
    var removeFlag = [[${@permission.hasPermi('clinic:medicine:remove')}]];
    var prefix = ctx + "clinic/medicine";

    $(function () {
        queryMedicineList();
    });

    function queryMedicineList() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "药品",
            columns: [{
                checkbox: true
            }, {
                field: 'medicineId',
                title: '药品ID'
            }, {
                field: 'name',
                title: '药品名称'
            }, {
                field: 'specification',
                title: '规格'
            }, {
                field: 'price',
                title: '价格'
            }, {
                field: 'stock',
                title: '库存'
            }, {
                field: 'expiryDate',
                title: '最近有效期',
                formatter: function (value) {
                    return value || '-';
                }
            }, {
                title: '操作',
                align: 'center',
                formatter: function (value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.medicineId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-info btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="openStockInPage()"><i class="fa fa-sign-in"></i>入库</a> ');
                    actions.push('<a class="btn btn-warning btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="openStockOutPage()"><i class="fa fa-sign-out"></i>出库</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.medicineId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    }

    function openStockInPage() {
        $.modal.openTab("药品入库", prefix + "/stock-in");
    }

    function openStockOutPage() {
        $.modal.openTab("药品出库", prefix + "/stock-out");
    }

    function openExpiryWarningPage() {
        $.modal.openTab("有效期管理", prefix + "/expiry-warning");
    }

</script>
</body>
</html>
