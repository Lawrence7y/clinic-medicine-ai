<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增患者')" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-content">
                        <form id="form-patient-add" class="form-horizontal">
                            <div class="form-group">
                                <label class="col-sm-3 control-label is-required">患者姓名：</label>
                                <div class="col-sm-8">
                                    <input name="name" placeholder="请输入患者姓名" class="form-control" type="text" maxlength="30" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">性别：</label>
                                <div class="col-sm-8">
                                    <select name="gender" class="form-control m-b">
                                        <option value="male">男</option>
                                        <option value="female">女</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">出生日期：</label>
                                <div class="col-sm-8">
                                    <input name="birthday" id="birthday" class="form-control" type="date" onchange="calculateAgeFromBirthday()">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">年龄：</label>
                                <div class="col-sm-8">
                                    <input name="age" id="age" placeholder="选择出生日期后自动计算" class="form-control" type="number" readonly>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">手机号码：</label>
                                <div class="col-sm-8">
                                    <input name="phone" placeholder="请输入手机号码" class="form-control" type="text" maxlength="11">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">住址：</label>
                                <div class="col-sm-8">
                                    <input name="address" placeholder="请输入住址" class="form-control" type="text">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">过敏史：</label>
                                <div class="col-sm-8">
                                    <textarea name="allergyHistory" placeholder="请输入过敏史" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">既往史：</label>
                                <div class="col-sm-8">
                                    <textarea name="pastHistory" placeholder="请输入既往史" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">血型：</label>
                                <div class="col-sm-8">
                                    <select name="bloodType" class="form-control m-b">
                                        <option value="">请选择</option>
                                        <option value="A">A型</option>
                                        <option value="B">B型</option>
                                        <option value="AB">AB型</option>
                                        <option value="O">O型</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">微信号：</label>
                                <div class="col-sm-8">
                                    <input name="wechat" placeholder="请输入微信号" class="form-control" type="text">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-offset-3 col-sm-8">
                                    <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
                                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭 </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script>
        var prefix = ctx + "clinic/patient";
        
        function calculateAgeFromBirthday() {
            var birthdayInput = document.getElementById('birthday').value;
            if (birthdayInput) {
                var birthDate = new Date(birthdayInput);
                var today = new Date();
                var age = today.getFullYear() - birthDate.getFullYear();
                var monthDiff = today.getMonth() - birthDate.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                    age--;
                }
                document.getElementById('age').value = age;
            }
        }
        
        function calculateAgeFromAge() {
            var ageInput = document.getElementById('age').value;
            if (ageInput) {
                var today = new Date();
                var birthYear = today.getFullYear() - parseInt(ageInput);
                var month = (today.getMonth() + 1).toString().padStart(2, '0');
                var day = today.getDate().toString().padStart(2, '0');
                document.getElementById('birthday').value = birthYear + '-' + month + '-' + day;
            }
        }

        $("#form-patient-add").validate({
        	onkeyup: false,
        	rules:{},
        	messages: {}
        });
        
        function submitHandler() {
	        if ($.validate.form()) {
	        	$.operate.save(prefix + "/add", $('#form-patient-add').serialize());
	        }
	    }
    </script>
</body>
</html>
