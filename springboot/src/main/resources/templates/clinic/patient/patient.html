<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('患者列表')" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="patient-form">
					<div class="select-list">
						<ul>
							<li>
								患者姓名：<input type="text" name="name" oninput="autoSearch(this)"/>
							</li>
							<li>
								手机号码：<input type="text" name="phone" oninput="autoSearch(this)"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							    <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
	        <div class="btn-group-sm" id="toolbar" role="group">
	             <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="clinic:patient:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="clinic:patient:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="clinic:patient:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        
	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('clinic:patient:edit')}]];
		var removeFlag = [[${@permission.hasPermi('clinic:patient:remove')}]];
		var prefix = ctx + "clinic/patient";
		var searchTimer = null;

		$(function() {
		    queryPatientList();
		});

		function autoSearch(obj) {
		    if (searchTimer) {
		        clearTimeout(searchTimer);
		    }
		    var value = $(obj).val();
		    if (value.length >= 1) {
		        searchTimer = setTimeout(function() {
		            $.table.search();
		        }, 300);
		    }
		}

		function queryPatientList() {
		    var options = {
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        exportUrl: prefix + "/export",
		        sortName: "createTime",
		        sortOrder: "desc",
		        modalName: "患者",
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'patientId',
		            title: '患者ID'
		        },
		        {
		            field: 'name',
		            title: '患者姓名'
		        },
		        {
		            field: 'gender',
		            title: '性别',
		            formatter: function(value, row, index) {
		                return value == '1' ? '男' : '女';
		            }
		        },
		        {
		            field: 'age',
		            title: '年龄'
		        },
		        {
                    field: 'phone',
                    title: '手机号码'
                },
                {
                    field: 'createTime',
		            title: '创建时间',
		            sortable: true
		        },
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		                var actions = [];
		                actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.patientId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.patientId + '\')"><i class="fa fa-remove"></i>删除</a>');
		                return actions.join('');
		            }
		        }]
		    };
		    $.table.init(options);
		}
	</script>
</body>
</html>
