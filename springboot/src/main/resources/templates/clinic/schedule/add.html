<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增排班')" />
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-content">
                    <form id="form-schedule-add" class="form-horizontal">
                        <div class="form-group">
                            <label class="col-sm-3 control-label is-required">医生姓名：</label>
                            <div class="col-sm-8">
                                <input type="hidden" name="doctorName" id="doctorName">
                                <select name="doctorId" id="doctorId" class="form-control m-b" required>
                                    <option value="">请选择医生</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">排班日期：</label>
                            <div class="col-sm-8">
                                <input name="scheduleDate" class="form-control" type="date">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">开始时间：</label>
                            <div class="col-sm-8">
                                <input name="startTime" class="form-control" type="time">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">结束时间：</label>
                            <div class="col-sm-8">
                                <input name="endTime" class="form-control" type="time">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">总号源：</label>
                            <div class="col-sm-8">
                                <input name="totalSlots" placeholder="请输入总号源" class="form-control" type="number">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-offset-3 col-sm-8">
                                <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保存</button>&nbsp;
                                <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关闭</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script>
    var prefix = ctx + "clinic/schedule";
    var doctorList = [];

    $(document).ready(function () {
        loadDoctorList();
        $('#doctorId').on('change', syncDoctorSelection);
    });

    function loadDoctorList() {
        $.ajax({
            url: ctx + "api/clinic/user/doctors",
            type: "get",
            async: false,
            success: function (response) {
                if (response.code == 0 && response.data) {
                    doctorList = response.data;
                    renderDoctorSelect();
                }
            }
        });
    }

    function renderDoctorSelect() {
        var select = $('#doctorId');
        select.empty();
        select.append('<option value="">请选择医生</option>');
        doctorList.forEach(function (doctor) {
            select.append('<option value="' + doctor.userId + '" data-name="' + doctor.userName + '">' + doctor.userName + '</option>');
        });
    }

    function syncDoctorSelection() {
        var selectedOption = $('#doctorId').find('option:selected');
        $('#doctorName').val(selectedOption.data('name') || '');
    }

    $("#form-schedule-add").validate({
        onkeyup: false,
        rules: {},
        messages: {}
    });

    function submitHandler() {
        var startTime = $.trim($('input[name="startTime"]').val());
        var endTime = $.trim($('input[name="endTime"]').val());
        if (startTime && endTime && startTime >= endTime) {
            $.modal.msgError("结束时间必须晚于开始时间");
            return;
        }
        if ($.validate.form()) {
            syncDoctorSelection();
            $.operate.save(prefix + "/add", $('#form-schedule-add').serialize());
        }
    }
</script>
</body>
</html>
