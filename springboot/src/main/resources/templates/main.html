<!DOCTYPE html>
<html  lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">
    <title>诊所管理系统首页</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
</head>

<body class="gray-bg">
    <div class="wrapper wrapper-content">
        <div class="row">
            <div class="col-sm-3">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-success pull-right">总计</span>
                        <h5>患者总数</h5>
                    </div>
                    <div class="ibox-content">
                        <h1 class="no-margins" th:text="${patientCount}">0</h1>
                        <small>患者信息</small>
                    </div>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-info pull-right">总计</span>
                        <h5>药品总数</h5>
                    </div>
                    <div class="ibox-content">
                        <h1 class="no-margins" th:text="${medicineCount}">0</h1>
                        <small>药品库存</small>
                    </div>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-warning pull-right">待补货</span>
                        <h5>库存不足</h5>
                    </div>
                    <div class="ibox-content">
                        <h1 class="no-margins" th:text="${lowStockMedicineCount}">0</h1>
                        <small>药品数量</small>
                    </div>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-primary pull-right">总计</span>
                        <h5>病历总数</h5>
                    </div>
                    <div class="ibox-content">
                        <h1 class="no-margins" th:text="${medicalRecordCount}">0</h1>
                        <small>病历记录</small>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-sm-4">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-danger pull-right" th:text="${pendingAppointmentCount}">0</span>
                        <h5>待处理预约</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="stat-percent font-bold text-danger" th:text="${pendingAppointmentCount}">0</div>
                        <small>待处理预约数</small>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-info pull-right" th:text="${confirmedAppointmentCount}">0</span>
                        <h5>已确认预约</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="stat-percent font-bold text-info" th:text="${confirmedAppointmentCount}">0</div>
                        <small>已确认预约数</small>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <span class="label label-danger pull-right" th:text="${nearExpiryBatchCount}">0</span>
                        <h5>有效期预警批次</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="stat-percent font-bold text-danger" th:text="${nearExpiryBatchCount}">0</div>
                        <small>30天内到期批次</small>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>待处理预约列表</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                <tr>
                                    <th>预约ID</th>
                                    <th>患者姓名</th>
                                    <th>预约日期</th>
                                    <th>预约时间</th>
                                    <th>预约状态</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="appointment : ${pendingAppointments}">
                                    <td th:text="${appointment.appointmentId}"></td>
                                    <td th:text="${appointment.patientName}"></td>
                                    <td th:text="${appointment.appointmentDate}"></td>
                                    <td th:text="${appointment.appointmentTime}"></td>
                                    <td>
                                        <span class="label label-warning" th:if="${appointment.status == 'pending'}">待处理</span>
                                        <span class="label label-info" th:if="${appointment.status == 'confirmed'}">已确认</span>
                                        <span class="label label-success" th:if="${appointment.status == 'completed'}">已完成</span>
                                        <span class="label label-default" th:if="${appointment.status == 'cancelled'}">已取消</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>有效期预警（30天内）</h5>
                        <div class="ibox-tools">
                            <a class="btn btn-xs btn-danger" th:href="@{/clinic/medicine/expiry-warning}">进入有效期页面</a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="table-responsive" th:if="${nearExpiryBatchCount > 0}">
                            <table class="table table-striped">
                                <thead>
                                <tr>
                                    <th>药品名称</th>
                                    <th>批次号</th>
                                    <th>有效期</th>
                                    <th>剩余库存</th>
                                    <th>剩余天数</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="batch : ${nearExpiryBatches}">
                                    <td th:text="${batch['medicineName']}">-</td>
                                    <td th:text="${batch['batchNumber']}">-</td>
                                    <td th:text="${#dates.format(batch['expiryDate'], 'yyyy-MM-dd')}">-</td>
                                    <td th:text="${batch['remainingQuantity']}">0</td>
                                    <td><span class="label label-warning" th:text="${batch['daysToExpiry'] + ' 天'}">0 天</span></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div th:if="${nearExpiryBatchCount == 0}" class="text-center text-muted" style="padding: 25px 0;">
                            暂无30天内到期的药品批次
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
